name: LinuxDO 活跃任务

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linuxdo-checkin
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-22.04
    environment: production
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      BROWSE_ENABLED: "true"
      LINUXDO_COOKIES: ${{ secrets.LINUXDO_COOKIES }}
    steps:
      - name: 校验 LinuxDO Cookie 配置
        run: |
          if [ -z "$LINUXDO_COOKIES" ]; then
            echo "GitHub production Environment Secret LINUXDO_COOKIES 未配置。" >&2
            exit 1
          fi

      - name: 检出代理辅助脚本
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 检出固定版本的 LinuxDO 签到实现
        uses: actions/checkout@v6
        with:
          repository: doveppp/linuxdo-checkin
          ref: 2b72a108950b45fa75ffd18517dda6da4e8fd57b
          path: linuxdo-checkin
          persist-credentials: false

      - name: 安装 Chrome
        uses: browser-actions/setup-chrome@v1

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        working-directory: linuxdo-checkin
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 配置可选代理
        env:
          PROXY_SUBSCRIPTION_URL: ${{ secrets.PROXY_SUBSCRIPTION_URL }}
          PROXY_TEST_URL: https://www.google.com/generate_204
          MIHOMO_VERSION: v1.19.27
          PROXY_REQUIRED: false
        run: bash scripts/setup_mihomo_proxy.sh

      - name: 将代理接入 LinuxDO 浏览器
        working-directory: linuxdo-checkin
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("main.py")
          source = path.read_text(encoding="utf-8")
          needle = "        self.browser = Chromium(co)"
          replacement = "\n".join(
              [
                  "        proxy_url = os.environ.get(\"CHECKIN_PROXY_URL\", \"\").strip()",
                  "        if proxy_url:",
                  "            co.set_proxy(proxy_url)",
                  "        self.browser = Chromium(co)",
              ]
          )
          if needle not in source:
              raise SystemExit("LinuxDO 上游源码结构已变化，无法注入代理配置")
          path.write_text(source.replace(needle, replacement, 1), encoding="utf-8")
          PY

      - name: 执行 LinuxDO 活跃任务
        working-directory: linuxdo-checkin
        run: python main.py

      - name: 推送 LinuxDO 成功通知
        if: success()
        env:
          SERVERPUSHKEY: ${{ secrets.SERVERPUSHKEY }}
        run: |
          HTTPS_PROXY="$CHECKIN_PROXY_URL" HTTP_PROXY="$CHECKIN_PROXY_URL" python scripts/notify_linuxdo.py \
            --title "LinuxDO 活跃任务成功" \
            --content "浏览任务完成。运行记录：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 停止代理
        if: always()
        run: bash scripts/stop_mihomo_proxy.sh
